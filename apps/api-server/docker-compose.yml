services:
  db:
    image: postgis/postgis:15-3.3
    container_name: gsc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gsc_user
      POSTGRES_PASSWORD: gsc_pass
      POSTGRES_DB: gsc_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsc_user -d gsc_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: .
    container_name: gsc_backend
    restart: unless-stopped
    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - .:/app
      - /app/node_modules  # Keep node_modules separate from mounted source

    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgdata: